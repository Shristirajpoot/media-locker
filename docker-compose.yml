version: '3.8'

services:
  backend:
    build: ./backend
    container_name: media-locker-backend
    ports:
      - "5000:5000"
    volumes:
      # Sync uploaded media files and SQLite database back to the host machine for inspection
      - ./backend/storage:/app/storage
    environment:
      - PORT=5000
      - JWT_SECRET=docker_jwt_secret_key_889900
      - NODE_ENV=production
    restart: unless-stopped
